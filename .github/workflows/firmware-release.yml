name: Firmware Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Release (ESP32-C3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout template
        uses: actions/checkout@v4
        with:
          path: firmware

      - name: Clone jettyd SDK
        run: |
          cd firmware
          git clone https://github.com/jettydiot/jettyd-firmware.git jettyd-sdk

      # Target selection: esp-idf-ci-action exports IDF_TARGET=esp32c3 into the
      # container; build.py and CMakeLists both honor it over device.yaml's
      # committed target, so no device.yaml rewrite is needed.
      - name: Set up ESP-IDF and build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.4
          target: esp32c3
          path: firmware

      - name: Merge firmware binaries
        run: |
          pip install esptool --quiet
          cd firmware
          python3 -m esptool --chip esp32c3 merge_bin \
            --output jettyd-esp32c3.bin \
            --flash_mode keep --flash_size keep --flash_freq keep \
            0x0     build/bootloader/bootloader.bin \
            0x8000  build/partition_table/partition-table.bin \
            0xf000  build/ota_data_initial.bin \
            0x20000 build/jettyd-device.bin

      - name: Verify merged binary
        run: |
          test -s firmware/jettyd-esp32c3.bin \
            || (echo "❌ Merged binary is empty or missing" && exit 1)
          echo "✅ jettyd-esp32c3.bin: $(wc -c < firmware/jettyd-esp32c3.bin) bytes"

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/jettyd-esp32c3.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
