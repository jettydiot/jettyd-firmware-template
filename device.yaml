# jettyd device configuration
# Edit the fields below, then: idf.py build flash monitor

# ── Required: Provisioning ────────────────────────────────────────────────────
jettyd:
  fleet_token: "ft_YOUR_TOKEN_HERE"
  mqtt_uri: "mqtt://mqtt.jettyd.com:1883"

# ── Required: WiFi ────────────────────────────────────────────────────────────
wifi:
  ssid: "YourNetworkName"
  password: "YourNetworkPassword"

# ── Device identity ───────────────────────────────────────────────────────────
name: "my-device"
version: "1.0.0"
target: "esp32s3"            # esp32s3 | esp32c3 | esp32c6

# ── Drivers ──────────────────────────────────────────────────────────────────
drivers:
  - name: led
    instance: "status"
    config:
      pin: 8
      active_high: true

  - name: button
    instance: "btn"
    config:
      pin: 0
      active_low: true

# ── Telemetry ─────────────────────────────────────────────────────────────────
defaults:
  heartbeat_interval: 60  # seconds — telemetry fires immediately on connect, then every N seconds
  report_metrics:
    - "system.rssi"
    # - "system.chip_temp"    # uncomment to include internal chip temperature
    # - "system.free_heap"    # uncomment to include free heap memory
